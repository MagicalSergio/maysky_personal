<svg width="48" height="24" viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.15; }
      40% { opacity: 1; }
    }
    .d1 { animation: pulse 1.2s ease-in-out infinite 0s; }
    .d2 { animation: pulse 1.2s ease-in-out infinite 0.2s; }
    .d3 { animation: pulse 1.2s ease-in-out infinite 0.4s; }
  </style>
  <circle class="d1" cx="8"  cy="12" r="5" fill="#7F77DD"/>
  <circle class="d2" cx="24" cy="12" r="5" fill="#7F77DD"/>
  <circle class="d3" cx="40" cy="12" r="5" fill="#7F77DD"/>
</svg>